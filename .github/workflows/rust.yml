name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  FFMPEG_VERSION: 6.1
  PJSIP_VERSION: 2.17

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # =========================
      # 依赖
      # =========================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            nasm yasm pkg-config build-essential

      # =========================
      # Cache FFmpeg build
      # =========================
      - name: Cache FFmpeg
        uses: actions/cache@v4
        with:
          path: third_party/ffmpeg-${{ env.FFMPEG_VERSION }}/dist
          key: ffmpeg-${{ env.FFMPEG_VERSION }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('stream/build_ffmpeg_min_bootstrap.sh') }}

      # =========================
      # Cache PJSIP build
      # =========================
      - name: Cache PJSIP
        uses: actions/cache@v4
        with:
          path: third_party/pjproject-${{ env.PJSIP_VERSION }}/dist
          key: pjsip-${{ env.PJSIP_VERSION }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('session/build_pjsip_bootstrap.sh') }}

      # =========================
      # Cache Cargo
      # =========================
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      # =========================
      # Bootstrap native dependencies
      # =========================
      - name: Bootstrap native dependencies
        run: bash scripts/bootstrap_dev.sh

      # =========================
      # Build Rust
      # =========================
      - name: Build Rust
        run: cargo build --verbose

      # =========================
      # Test
      # =========================
      - name: Run tests
        run: cargo test --verbose