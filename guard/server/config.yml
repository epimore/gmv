db:
  mysql:
    host_or_ip: 127.0.0.1
    port: 3306
    db_name: gmv
    user: gmv
    pass_crypto_enable: false
    pass: ""
    attrs:
      log_global_sql_level: debug
      log_slow_sql_timeout: 30
      timezone: "+8:00"
      charset: utf8mb4
      ssl_level: 0
    pool:
      max_connections: 10
      min_connections: 0
      connection_timeout: 8
      max_lifetime: 1800
      idle_timeout: 60
      check_health: false

log:
  level: info
  prefix: guard
  store_path: ./logs

guard:
  http:
    bind_addr: 0.0.0.0:8080
    origins:
      - http://127.0.0.1:5173
      - http://localhost:5173
      - http://127.0.0.1:8080
    ui_dist_dir: guard/ui/dist
    tls:
      enabled: false
      certificate_path: ""
      private_key_path: ""
    session_ttl_sec: 28800
    login_window_sec: 60
    max_failed_attempts: 5

  grpc:
    bind_addr: 127.0.0.1:18080
    heartbeat_interval_ms: 5000
    heartbeat_timeout_ms: 20000
    tls:
      enabled: false # TLS 默认启用；开发/受控内网可显式关闭。
      certificate_path: ""
      private_key_path: ""

  internal_comm:
    mode: rpc # http | dual | rpc；Phase 6 后固定为 rpc，内部控制不再依赖 HTTP。

  database:
    backend: sqlite # sqlite | mysql
    auto_migrate: true
    pool:
      max_connections: 10
      min_connections: 0
      connection_timeout_sec: 8
      max_lifetime_sec: 1800
      idle_timeout_sec: 60
      check_health: false
    sqlite:
      path: guard/server/data/guard.db
    # mysql:
    #   host: 127.0.0.1
    #   port: 3306
    #   database: gmv
    #   username: gmv
    #   pass_crypto_enable: false
    #   pass: ""
    #   ssl_mode: preferred # disabled | preferred | required | verify_ca | verify_identity

  bootstrap:
    admin:
      # 仅 guard_user 为空时写入一次，之后不会覆盖数据库用户。
      username: admin
      pass_crypto_enable: false # 密码是否加密，默认不加密。
      pass: "zaq12345" # 空库首次启动前必须设置；已有用户后可留空，避免长期保存 bootstrap 密码。
      local_login_only: false # 仅从配置文件读取；修改后需重启 guard 生效。

  simulator:
    enabled: false

  media:
    picture_upload:
      storage_path: ./pics/raw
      max_upload_bytes: 10485760
      max_session_age_sec: 300

  integrations:
    mqtt:
      enabled: false
      broker: 127.0.0.1
      port: 8883
      client_id: gmv-guard
      username: guard
      pass_crypto_enable: false # 密码是否加密，默认不加密。
      pass: ""
      tls: true
      subscribe_topics:
        - gmv/commands/#
      publish_event_topics:
        - session.alarm
        - guard.picture.uploaded
      publish_topic_prefix: gmv/events
      publish_event_ttl_sec: 86400 # MQTT事件暂存有效期；超过后标记失败，不再补发陈旧事件
